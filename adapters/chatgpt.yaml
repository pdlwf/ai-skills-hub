name: chatgpt
display_name: ChatGPT (Desktop)
install_path: ~/Library/Application Support/ChatGPT/skills
file_types:
  - .md
  - .json
skill_subfolder: true
notes: >
  ChatGPT desktop on macOS. Skills are stored per-app in Application Support.
  If the directory does not exist, installer will create it.
  Note: ChatGPT custom instructions / skills support may vary by version.
