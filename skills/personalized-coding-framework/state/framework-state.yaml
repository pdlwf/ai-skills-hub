summary: "Project workflow is idea-first, uses a three-phase idea -> PD -> epics stream, requires a dedicated folder for each idea, keeps schedule-business judgment boundaries explicit, allows workbook-authored status logic to override generic inference, prioritizes structured date extraction over report packaging for the Excel date skill, treats remark/update/feedback columns as evidence-bearing note sources, requires approval plus logging for skill self-maintenance, and now includes project-specific defaults for the email triage system: web dashboard output, rule-first project classification, a broad attachment surface, a two-week initial history window, a bias toward low false positives, Graph-first delegated-user mailbox ingestion, retention cleanup with preserved completion traces, structured open-item tracking fields, contextual attachment reading, and selective reason capture on high-conflict user corrections."

