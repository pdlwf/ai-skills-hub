principles:
  - id: prj_idea_first_repo
    statement: "Treat this repository as an idea-development stream focused on reframing ideas into clearer artifacts rather than as a generic code project."
    kind: default_behavior
    scope: project
    priority: 5
    confidence: 0.95
    evidence_ids:
      - sig_20260309_idea_stream
    status: active
    notes: "Favor idea capture, reframing, and documentation structure."
  - id: prj_three_phase_idea_pd_epics
    statement: "Use a three-phase progression of kickoff discussion, PD drafting, and epic-story elaboration for idea development in this repository."
    kind: default_behavior
    scope: project
    priority: 5
    confidence: 0.95
    evidence_ids:
      - sig_20260309_three_phase_flow
    status: active
    notes: "Default artifact flow for each idea."
  - id: prj_dedicated_folder_per_idea
    statement: "Create a dedicated folder for every new idea."
    kind: hard_constraint
    scope: project
    priority: 5
    confidence: 0.98
    evidence_ids:
      - sig_20260309_dedicated_folder
    status: active
    notes: "Folder-per-idea is mandatory for repository organization."
  - id: dom_schedule_judgment_boundary
    statement: "For schedule and date-analysis tasks, infer likely delay or attention-needed status from workbook evidence, but leave judgments such as manageable or blocking to the user unless the workbook explicitly defines them."
    kind: hard_constraint
    scope: domain
    priority: 5
    confidence: 0.96
    evidence_ids:
      - sig_20260320_schedule_judgment_boundary
    status: active
    notes: "Applies to the Excel date-understanding skill and similar schedule-analysis work."
  - id: dom_workbook_authored_status_override
    statement: "For workbook schedule analysis, explicit status text in non-date cells and inspectable conditional-format logic should be adopted as workbook-authored meaning; new conditional-format patterns should be promoted back into the reusable skill rules when validated."
    kind: hard_constraint
    scope: domain
    priority: 5
    confidence: 0.97
    evidence_ids:
      - sig_20260320_workbook_authored_status_override
    status: active
    notes: "This creates an exception to the generic business-judgment boundary when the workbook itself states the judgment."
  - id: dom_date_data_over_reports
    statement: "For the Excel date-understanding skill, prioritize structured project-date extraction and date analysis over polished report packaging."
    kind: hard_constraint
    scope: domain
    priority: 5
    confidence: 0.98
    evidence_ids:
      - sig_20260320_date_data_over_reports
    status: active
    notes: "Reports are secondary renderings; structured date facts are the primary artifact."
  - id: dom_note_columns_as_evidence
    statement: "For the Excel date-understanding skill, columns whose headers indicate note-like content such as remark, update, or feedback should be extracted as evidence-bearing text fields and used in date interpretation and anomaly analysis."
    kind: hard_constraint
    scope: domain
    priority: 5
    confidence: 0.98
    evidence_ids:
      - sig_20260320_note_columns_as_evidence
    status: active
    notes: "These columns are part of the date-understanding surface even when they are not date-formatted."
  - id: dom_self_maintenance_with_approval
    statement: "For the Excel date-understanding skill, reusable improvements discovered during usage should be proposed first, applied only after user approval, and recorded in an explicit maintenance log after the change."
    kind: hard_constraint
    scope: domain
    priority: 5
    confidence: 0.99
    evidence_ids:
      - sig_20260320_self_maintenance_with_approval
    status: active
    notes: "The skill should improve cumulatively, but never through silent self-modification."
  - id: prj_local_export_before_api_integration
    statement: "For the email triage system MVP, use a local Outlook export script and project-directory ingestion instead of direct Microsoft API integration."
    kind: hard_constraint
    scope: project
    priority: 5
    confidence: 0.97
    evidence_ids:
      - sig_20260402_local_export_email_system
    status: active
    notes: "Optimize for delivery speed and operational simplicity in the first phase."
  - id: prj_web_dashboard_primary_output
    statement: "For the email triage system, present the main output as a web dashboard rather than email, Notion, or spreadsheet reports."
    kind: default_behavior
    scope: project
    priority: 5
    confidence: 0.98
    evidence_ids:
      - sig_20260402_web_dashboard_output
    status: active
    notes: "The dashboard is the primary daily review surface."
  - id: prj_rule_first_project_mapping
    statement: "For project classification in the email triage system, apply deterministic rules first: tinno.com -> PD1, chino-e.com -> SD1, internal emails via PD1/SD1 cues, and shared PD1+SD1 matters as common share."
    kind: hard_constraint
    scope: project
    priority: 5
    confidence: 0.99
    evidence_ids:
      - sig_20260402_rule_first_project_mapping
    status: active
    notes: "Rule-first mapping is preferred over free-form model classification to control false positives."
  - id: prj_all_attachment_types_in_scope
    statement: "For the email triage system MVP, include PDF, Excel, and image attachments in the understanding surface."
    kind: default_behavior
    scope: project
    priority: 4
    confidence: 0.95
    evidence_ids:
      - sig_20260402_all_attachments_in_scope
    status: active
    notes: "Coverage is broad, but extraction confidence should still be surfaced."
  - id: prj_two_week_initial_history_window
    statement: "For the email triage system MVP, limit historical backfill to the most recent two weeks of mail."
    kind: hard_constraint
    scope: project
    priority: 5
    confidence: 0.97
    evidence_ids:
      - sig_20260402_two_week_history_window
    status: active
    notes: "Keep the first phase small and fast to validate."
  - id: prj_low_false_positive_bias
    statement: "For the email triage system, optimize for low false positives over maximum recall when deciding which tasks and risks to surface prominently."
    kind: hard_constraint
    scope: project
    priority: 5
    confidence: 0.99
    evidence_ids:
      - sig_20260402_low_false_positive_bias
    status: active
    notes: "Prefer a confidence-tiered output and conservative action-item extraction."
  - id: prj_retention_cleanup_with_completion_trace
    statement: "For the email triage system, control local storage growth by cleaning up expired or completed raw email content while retaining minimal completion traces including email date, subject, and item history."
    kind: hard_constraint
    scope: project
    priority: 5
    confidence: 0.98
    evidence_ids:
      - sig_20260402_retention_cleanup_with_completion_trace
    status: active
    notes: "Cleanup must not erase the user's ability to trace what was completed."
  - id: prj_broader_attachment_surface
    statement: "For the email triage system MVP, cover a broad attachment surface including PowerPoint, common Office documents, and common archive formats in addition to PDF, Excel, and images."
    kind: default_behavior
    scope: project
    priority: 4
    confidence: 0.96
    evidence_ids:
      - sig_20260402_broader_attachment_scope
    status: active
    notes: "Archives should still be handled conservatively."
  - id: prj_common_share_project_detail
    statement: "When the email triage system classifies an item as common share, it should preserve which concrete projects are involved whenever that can be inferred."
    kind: default_behavior
    scope: project
    priority: 4
    confidence: 0.97
    evidence_ids:
      - sig_20260402_common_share_project_detail
    status: active
    notes: "Common-share items should not lose project detail if it is available."
  - id: prj_script_export_preferred
    statement: "For the email triage system, prefer a script-driven Outlook export workflow over repeated manual user export steps."
    kind: hard_constraint
    scope: project
    priority: 5
    confidence: 0.99
    evidence_ids:
      - sig_20260402_script_export_preferred
    status: active
    notes: "Operational friction must stay low to sustain adoption."
  - id: prj_structured_open_item_tracking
    statement: "For unresolved items in the email triage system, support structured tracking fields such as remark, kickoff date, due date, delay days, and impact."
    kind: default_behavior
    scope: project
    priority: 5
    confidence: 0.99
    evidence_ids:
      - sig_20260402_structured_open_item_tracking
    status: active
    notes: "Open work should be actively managed, not only inferred."
  - id: prj_contextual_attachment_reading
    statement: "For the email triage system, decide whether to read attachments immediately or defer them based on email context and current evidence needs."
    kind: hard_constraint
    scope: project
    priority: 5
    confidence: 0.98
    evidence_ids:
      - sig_20260402_contextual_attachment_reading
    status: active
    notes: "Do not force every attachment through full semantic analysis on first pass."
  - id: prj_conflict_reason_capture
    statement: "When a user correction materially conflicts with the system's prior understanding in the email triage system, the system may request a short reason and preserve it as part of feedback handling."
    kind: default_behavior
    scope: project
    priority: 4
    confidence: 0.96
    evidence_ids:
      - sig_20260402_conflict_reason_capture
    status: active
    notes: "Reason capture should remain selective to avoid interaction fatigue."

