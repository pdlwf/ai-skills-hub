name: Auto Changelog

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'

jobs:
  changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Changelog Entry
        run: |
          DATE=$(date +'%Y-%m-%d %H:%M UTC')
          COMMIT_MSG=$(git log -1 --pretty=%s)
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- skills/ | head -20)

          echo "" >> CHANGELOG.md
          echo "## $DATE" >> CHANGELOG.md
          echo "_$COMMIT_MSG_" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "Changed files:" >> CHANGELOG.md
          echo "$CHANGED" | while read f; do echo "- \`$f\`" >> CHANGELOG.md; done

      - name: Commit Changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --staged --quiet || git commit -m "chore: update changelog [skip ci]"
          git push
